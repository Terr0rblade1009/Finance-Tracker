name: FinanceTracker
options:
  bundleIdPrefix: com.financetracker
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true
  groupSortPosition: top
  localizedStringSwiftUI: true
  developmentLanguage: zh-Hans
  knownRegions:
    - zh-Hans
    - en
    - Base

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    GENERATE_INFOPLIST_FILE: YES
    INFOPLIST_FILE: FinanceTracker/Info.plist
    DEVELOPMENT_LANGUAGE: zh-Hans

targets:
  FinanceTracker:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: FinanceTracker
        excludes:
          - "Info.plist"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.financetracker.app
        INFOPLIST_FILE: FinanceTracker/Info.plist
        INFOPLIST_KEY_CFBundleDisplayName: "记账本"
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1.1"
        SWIFT_EMIT_LOC_STRINGS: YES
        ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: YES
      configs:
        Debug:
          SWIFT_OPTIMIZATION_LEVEL: "-Onone"
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        Release:
          SWIFT_OPTIMIZATION_LEVEL: "-O"
    info:
      path: FinanceTracker/Info.plist
      properties:
        NSCameraUsageDescription: "需要访问相机以拍摄收据进行记账"
        NSMicrophoneUsageDescription: "需要访问麦克风以进行语音记账"
        NSSpeechRecognitionUsageDescription: "需要语音识别权限以进行语音记账"
        NSPhotoLibraryUsageDescription: "需要访问相册以导入收据图片"
